{% extends "base.html" %}
{% block title %}Iniciar Sesión — Gestor de perfiles{% endblock %}

{% block content %}
<section class="card" style="max-width: 400px; margin: 40px auto;">
  <h2>🔐 Iniciar Sesión</h2>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="form">
    {% csrf_token %}

    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="Tu contraseña" required />
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
  </form>

  <p style="margin-top: 20px; text-align: center;">
    ¿No tienes cuenta? <a href="{% url 'register' %}">Registrarse aquí</a>
  </p>
</section>
{% endblock %}
